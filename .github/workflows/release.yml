name: Release

# Two trigger paths share the same build matrix:
#   1. Push a `v*` tag         → build + auto-create GitHub Release with binaries
#   2. workflow_dispatch (UI)  → build only, artifacts available for manual download
#
# No code signing; binaries are distributed as tar.gz (Linux/macOS) and zip (Windows)
# with a sidecar `builtin/` directory next to the executable.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target platform (or "all")'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - win-x64
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64

permissions:
  contents: write   # Needed for softprops/action-gh-release on tag push

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win-x64
            runner: windows-latest
            archive: zip
            smoke: true
          - target: linux-x64
            runner: ubuntu-latest
            archive: tar.gz
            smoke: true
          - target: linux-arm64
            runner: ubuntu-latest      # cross-compile via Bun --target=bun-linux-arm64
            archive: tar.gz
            smoke: false               # cannot exec arm64 binary on x64 runner
          - target: darwin-x64
            runner: macos-14            # cross-compile via Bun --target=bun-darwin-x64
            archive: tar.gz             # macos-13 was deprecated by GitHub Actions and queues indefinitely
            smoke: false                # Apple Silicon host running x64 needs Rosetta; skip to keep CI deterministic
          - target: darwin-arm64
            runner: macos-14
            archive: tar.gz
            smoke: true

    steps:
      - name: Filter by manual target
        id: filter
        shell: bash
        run: |
          requested="${{ github.event.inputs.target }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             && [ -n "$requested" ] \
             && [ "$requested" != "all" ] \
             && [ "$requested" != "${{ matrix.target }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.target }} (requested: $requested)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.filter.outputs.skip == 'false'

      - uses: actions/setup-node@v4
        if: steps.filter.outputs.skip == 'false'
        with:
          node-version: '22'
          cache: 'npm'

      - uses: oven-sh/setup-bun@v2
        if: steps.filter.outputs.skip == 'false'
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.filter.outputs.skip == 'false'
        run: npm ci

      - name: Build binary (${{ matrix.target }})
        if: steps.filter.outputs.skip == 'false'
        run: node scripts/build-binary.mjs --target=${{ matrix.target }}

      - name: Smoke test
        if: steps.filter.outputs.skip == 'false' && matrix.smoke
        shell: bash
        run: |
          bin_dir="dist/binary/${{ matrix.target }}"
          if [ "${{ matrix.target }}" = "win-x64" ]; then
            "$bin_dir/kodax.exe" --version
          else
            chmod +x "$bin_dir/kodax"
            "$bin_dir/kodax" --version
          fi

      - name: Determine version
        if: steps.filter.outputs.skip == 'false'
        id: version
        shell: bash
        run: |
          v=$(node -p "require('./package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF#refs/tags/}"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$v-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package archive
        if: steps.filter.outputs.skip == 'false'
        id: package
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          version="${{ steps.version.outputs.version }}"
          archive_base="kodax-v${version}-${target}"

          cd "dist/binary/${target}"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            archive_file="${archive_base}.zip"
            # Windows 10+ ships with bsdtar; powershell Compress-Archive also works.
            powershell -Command "Compress-Archive -Path kodax.exe,builtin -DestinationPath '$archive_file' -Force"
          else
            archive_file="${archive_base}.tar.gz"
            tar -czf "$archive_file" kodax builtin
          fi

          mkdir -p "${GITHUB_WORKSPACE}/dist/release"
          mv "$archive_file" "${GITHUB_WORKSPACE}/dist/release/"
          cd "${GITHUB_WORKSPACE}"

          # SHA256 alongside archive
          if command -v sha256sum >/dev/null 2>&1; then
            ( cd dist/release && sha256sum "$archive_file" > "${archive_file}.sha256" )
          else
            # macOS uses shasum
            ( cd dist/release && shasum -a 256 "$archive_file" > "${archive_file}.sha256" )
          fi

          echo "archive_file=$archive_file" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        if: steps.filter.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: kodax-${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Aggregate SHA256SUMS
        shell: bash
        run: |
          cd dist/release
          ls -la
          # Collect per-archive .sha256 lines into a single SHA256SUMS file
          : > SHA256SUMS
          for f in *.sha256; do
            cat "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Generate release notes from git log
        id: notes
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Find previous canonical release tag by date. `--list 'v*'`
          # restricts to tags matching the release naming convention,
          # excluding local experiment tags (e.g. 'v0.7.27-DSready') that
          # would otherwise pollute the changelog range.
          prev=$(git tag --list 'v[0-9]*' --sort=-creatordate | grep -v "^${tag}$" | head -1 || true)
          if [ -n "$prev" ]; then
            range="${prev}..${tag}"
          else
            range="${tag}"
          fi

          {
            echo "body<<EOF"
            echo "## What's changed in ${tag}"
            echo
            git log --pretty=format:'- %s (%h)' "$range" || true
            echo
            echo
            echo "## Downloads"
            echo
            echo "Each archive contains the \`kodax\` executable and a sidecar \`builtin/\` directory."
            echo "Extract anywhere and run \`./kodax\` (or \`kodax.exe\` on Windows). No Node.js required."
            echo
            echo "Verify integrity with the matching \`.sha256\` file or the aggregated \`SHA256SUMS\`."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.tar.gz
            dist/release/*.zip
            dist/release/*.sha256
            dist/release/SHA256SUMS
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
