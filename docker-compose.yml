# docker-compose.yml — KodaX deployment profiles
#
# Interactive REPL:
#   docker compose run --rm kodax
#
# ACP server (background):
#   docker compose up -d kodax-server
#
# Build for specific platform:
#   TARGETPLATFORM=linux/arm64 docker compose build

services:
  # Interactive REPL mode (default)
  kodax:
    build:
      context: .
      dockerfile: Dockerfile
    image: kodax:latest
    stdin_open: true      # -i
    tty: true             # -t
    volumes:
      - kodax-config:/home/kodax/.kodax
      # Mount a project directory to work on:
      # - /path/to/your/project:/workspace
    working_dir: /workspace
    env_file:
      - path: .env.local
        required: false
    environment:
      - NODE_ENV=production
      # API keys are loaded from .env.local (not committed to git).
      # Create .env.local with: ANTHROPIC_API_KEY=sk-ant-xxx

  # ACP server mode (headless, for integrations)
  kodax-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: kodax:latest
    command: ["--acp", "--port", "7860"]
    ports:
      - "127.0.0.1:7860:7860"
    volumes:
      - kodax-config:/home/kodax/.kodax
    env_file:
      - path: .env.local
        required: false
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  kodax-config:
